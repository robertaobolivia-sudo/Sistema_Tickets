# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/suporte_tickets
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.use_sql_comments=true

# Application Configuration
spring.application.name=suporte-tickets
# Base URL pública para link de avaliação (Sprint 200)
app.public-base-url=http://localhost:8080
# Sprint 253: reset operacional DEV (somente local). Desligar após massa aplicada.
app.sprint253.dev-reset=false
# Sprint 256: remover duplicados legados (somente local). Desligar após execução.
app.sprint256.dedup-clientes-dev=false
# Sprint 260: ao subir, remove duplicados/conexão/E2E se massa sair de 4 LTDA (sem recriar).
app.dev.clientes-massa-guard=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Fotos de perfil: pasta fixa uploads/analistas (relativa ao diretório de execução da aplicação)
server.error.include-message=always
server.error.include-stacktrace=on_param
