# Gate pos-reestruturacao (F48/F54): Maven + Vitest + package + app em background + Playwright F45
# Nucleo Cliente / Contato / Ticket — sem regressao de legado operacional.

name: Gate pos-reestruturacao

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: gate-pos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate pos-reestruturacao
    runs-on: ubuntu-latest
    timeout-minutes: 50

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: e2e_ci_root
          MYSQL_DATABASE: suporte_tickets
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pe2e_ci_root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      CI: true
      E2E_BASE_URL: http://localhost:8080
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/suporte_tickets?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: e2e_ci_root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SMOKE_ADMIN_EMAIL: robertaobolivia@gmail.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven test
        run: mvn -B test

      - name: Setup Node.js (Vitest + E2E)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            e2e/package-lock.json
            src/main/resources/static/js/package-lock.json

      - name: Vitest
        working-directory: src/main/resources/static/js
        run: |
          npm ci
          npm test

      - name: Maven package
        run: mvn -B -q package -DskipTests

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Start Spring Boot (background)
        run: |
          nohup java -jar target/suporte-tickets-1.0.0.jar > spring-boot.log 2>&1 &
          echo $! > spring-boot.pid
          echo "Spring Boot PID=$(cat spring-boot.pid)"

      - name: Wait for HTTP 200
        run: |
          set -e
          ok=0
          for i in $(seq 1 120); do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              echo "HTTP 200 OK (tentativa $i)"
              ok=1
              break
            fi
            echo "Aguardando app... $i"
            sleep 2
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::App nao respondeu em http://localhost:8080/ apos 240s"
            tail -n 300 spring-boot.log || true
            exit 1
          fi
          curl -fsS http://localhost:8080/

      - name: Playwright F45 (pos-reestruturacao)
        working-directory: e2e
        env:
          E2E_SKIP_WEB_SERVER: '1'
          # Required check: configure secret SMOKE_ADMIN_SENHA in repo Settings → Secrets.
          SMOKE_ADMIN_SENHA: ${{ secrets.SMOKE_ADMIN_SENHA }}
        run: |
          if [ -z "${SMOKE_ADMIN_SENHA}" ]; then
            echo "::warning::SMOKE_ADMIN_SENHA não definido; usando fallback de dev (defina o secret no repositório)."
            export SMOKE_ADMIN_SENHA='@Hipcom123789'
          fi
          npm run test:pos-reestruturacao

      - name: Upload CI debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gate-pos-reestruturacao-debug
          path: |
            spring-boot.log
            e2e/playwright-report/
            e2e/test-results/
            target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7
