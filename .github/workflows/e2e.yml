# E2E Playwright — suporte-tickets (Sprint 225)
# MySQL service + Maven package + Playwright webServer (sem E2E_SKIP_WEB_SERVER).

name: E2E Playwright

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: e2e_ci_root
          MYSQL_DATABASE: suporte_tickets
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pe2e_ci_root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      CI: true
      E2E_BASE_URL: http://localhost:8080
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/suporte_tickets?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: e2e_ci_root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Analista seed (Sprint95) — override via secrets em forks privados
      SMOKE_ADMIN_EMAIL: robertaobolivia@gmail.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven package
        run: mvn -B -q package -DskipTests

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        working-directory: e2e
        env:
          SMOKE_ADMIN_SENHA: ${{ secrets.SMOKE_ADMIN_SENHA }}
        run: |
          if [ -z "${SMOKE_ADMIN_SENHA}" ]; then
            export SMOKE_ADMIN_SENHA='@Hipcom123789'
          fi
          npm test

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
